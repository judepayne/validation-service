# Local Configuration (Tier 1)
# Infrastructure config - owned by service team
# Points to business configuration location

# URI to business config (tier 2)
# Supports: relative paths, file:// (absolute), http://, https://
business_config_uri: "../logic/business-config.yaml"

# Optional: Cache directory for remote logic package
# Only used when business_config_uri is a remote URL
# Default: /tmp/validation-cache
logic_cache_dir: "/tmp/validation-cache"
